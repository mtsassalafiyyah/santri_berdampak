<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Selamat Datang Santri Hebat</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="slides" id="slides">
  <!-- Slide 1 -->
  <div class="slide">
    <div class="content">
      <div class="header-welcome">
        <h1>Selamat Datang!</h1>
        <div class="subtitle">Evomatsa</div>
      </div>
      <div class="welcome-text">
  <span class="blink-letter">S</span><span class="blink-letter">A</span><span class="blink-letter">N</span><span class="blink-letter">T</span><span class="blink-letter">R</span><span class="blink-letter">I</span><span class="blink-letter"> </span>
  <span class="blink-letter">H</span><span class="blink-letter">E</span><span class="blink-letter">B</span><span class="blink-letter">A</span><span class="blink-letter">T</span><span class="blink-letter">,</span><span class="blink-letter"> </span>
  <br> <!-- atau pakai <div> jika mau kontrol margin -->
  <span class="blink-letter">S</span><span class="blink-letter">A</span><span class="blink-letter">N</span><span class="blink-letter">T</span><span class="blink-letter">R</span><span class="blink-letter">I</span><span class="blink-letter"> </span>
  <span class="blink-letter">B</span><span class="blink-letter">E</span><span class="blink-letter">R</span><span class="blink-letter">D</span><span class="blink-letter">A</span><span class="blink-letter">M</span><span class="blink-letter">P</span><span class="blink-letter">A</span><span class="blink-letter">K</span><span class="blink-letter"> </span>
  <span class="blink-letter">U</span><span class="blink-letter">N</span><span class="blink-letter">T</span><span class="blink-letter">U</span><span class="blink-letter">K</span><span class="blink-letter"> </span>
  <span class="blink-letter">N</span><span class="blink-letter">E</span><span class="blink-letter">G</span><span class="blink-letter">E</span><span class="blink-letter">R</span><span class="blink-letter">I</span>
</div>
      <form id="slide1Form">
        <label for="nama">Nama Lengkap:</label>
        <input type="text" id="nama" placeholder="Masukkan nama lengkap kamu" required>
        <label for="kelas">Kelas :</label>
        <input type="text" id="kelas" placeholder="Contoh: 9A/9B/9C/9D/9E/9F" required>
        
      </form>
    </div>
  </div>
  <!-- Slide 2 tetap sama seperti sebelumnya -->
  <div class="slide">
    <div class="content">
      <h1>Peran & Refleksi Diri</h1>
      <form id="dataForm" onsubmit="return submitAndRedirect(event)">
        <input type="hidden" id="hiddenNama" name="nama">
        <input type="hidden" id="hiddenKelas" name="kelas">
        <div class="section">
          <h2>Pilih Peran yang Kamu Jalankan</h2>
          <div class="checkbox-group">
            <label><input type="checkbox" name="peran[]" value="Imam Sholat"> Imam Sholat</label>
            <label><input type="checkbox" name="peran[]" value="Muadzin"> Muadzin</label>
            <label><input type="checkbox" name="peran[]" value="Memimpin Pujian/Sholawat"> Memimpin Pujian / Sholawat</label>
            <label><input type="checkbox" name="peran[]" value="Ceramah/Kultum/Khutbah"> Ceramah / Kultum / Khutbah</label>
            <label><input type="checkbox" name="peran[]" value="Mengajar TPA/TPQ"> Mengajar TPA / TPQ</label>
            <label><input type="checkbox" name="peran[]" value="Memimpin Tahlil"> Memimpin Tahlil</label>
            <label><input type="checkbox" name="peran[]" value="Memimpin Tadarus"> Memimpin Tadarus</label>
            <label><input type="checkbox" name="peran[]" value="Membersihkan Masjid/Mushola"> Membersihkan Masjid / Mushola</label>
            <label><input type="checkbox" name="peran[]" value="Lain-lain: isi di catatan bawah ini"> Lain-lain: isi di catatan bawah ini</label>
          </div>
        </div>
        <div class="section">
          <label for="kesan">Kesan:</label>
          <textarea name="kesan" rows="6" placeholder="Tuliskan kesanmu selama menjalankan peran di masyarakat..."></textarea>
        </div>
        <div class="section">
          <label for="evaluasi">Evaluasi Diri:</label>
          <textarea name="evaluasi" rows="8" placeholder="Apa yang sudah baik dari dirimu, dan apa yang perlu diperbaiki ke depan..."></textarea>
        </div>
        <button type="submit" id="submitBtn">Kirim Data & Lanjut Upload Foto</button>
        <div id="status"></div>
      </form>
    </div>
  </div>
</div>
<script src="script.js"></script>
</body>

</html>
